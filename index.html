<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Password Check</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <h1>API Password Check</h1>
    <p>Введите пароль и проверьте его через API.</p>

    <div class="row">
      <input id="password" type="password" placeholder="Пароль" autocomplete="off" />
      <button id="checkBtn">Проверить</button>
    </div>

    <div class="result" id="result">Ожидание запроса…</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
